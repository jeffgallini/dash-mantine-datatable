name: Publish Release

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
    steps:
      - name: Check out merged release commit
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r tests/requirements.txt

      - name: Validate release metadata
        id: release
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          version="$(python scripts/validate_release_pr.py --print-version)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build and verify release artifacts
        run: python scripts/check_release.py

      - name: Ensure PyPI token is configured
        if: ${{ secrets.PYPI_API_TOKEN == '' }}
        run: |
          echo "Missing PYPI_API_TOKEN secret in the 'pypi' environment." >&2
          exit 1

      - name: Publish package to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload --skip-existing dist/*

      - name: Generate GitHub release notes
        run: python scripts/extract_release_notes.py "${{ steps.release.outputs.version }}" > "$RUNNER_TEMP/release-notes.md"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ steps.release.outputs.version }}
          RELEASE_TITLE: ${{ github.event.pull_request.title }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file "$RUNNER_TEMP/release-notes.md"
          else
            gh release create "$RELEASE_TAG" --target "${GITHUB_SHA}" --title "$RELEASE_TITLE" --notes-file "$RUNNER_TEMP/release-notes.md"
          fi
